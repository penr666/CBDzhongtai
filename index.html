<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBD 商城管理系统</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #4F6EF7;
  --primary-light: #EEF1FE;
  --primary-dark: #3B55D9;
  --success: #34C759;
  --success-light: #ECFDF5;
  --warning: #F5A623;
  --warning-light: #FFF8EC;
  --danger: #F5222D;
  --danger-light: #FFF1F0;
  --info: #13C2C2;
  --info-light: #E6FFFB;
  --bg: #F5F7FA;
  --white: #FFFFFF;
  --card: #FFFFFF;
  --border: #E8ECF0;
  --border-light: #F0F2F5;
  --divider: #F0F2F5;
  --text-primary: #1F2937;
  --text-regular: #4B5563;
  --text-secondary: #9CA3AF;
  --text-placeholder: #C0C4CC;
  --text-link: #4F6EF7;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --table-header-bg: #F5F7FA;
  --bg-page: #F5F7FA;
  --bg-white: #FFFFFF;
}
body { font-family: 'Noto Sans SC', 'Inter', -apple-system, sans-serif; font-size: 14px; color: var(--text-regular); background: var(--bg); line-height: 1.5; }
ul, li { list-style: none; }
a { text-decoration: none; color: var(--text-link); }
a:hover { text-decoration: underline; }
button { cursor: pointer; border: none; outline: none; font-size: 14px; font-family: inherit; }
input, select, textarea { font-size: 14px; font-family: inherit; }

/* System Switcher */
.system-switcher {
  height: 40px; background: #1a1a2e; display: flex; align-items: center; padding: 0 16px; gap: 4px; position: fixed; top: 0; left: 0; right: 0; z-index: 200;
}
.sys-tab {
  padding: 6px 16px; font-size: 13px; color: rgba(255,255,255,0.6); cursor: pointer; border-radius: 6px; transition: all 0.2s; font-weight: 500;
}
.sys-tab:hover { color: #fff; background: rgba(255,255,255,0.1); }
.sys-tab.active { color: #fff; background: var(--primary); }
.sys-tab-logo { color: #fff; font-weight: 700; font-size: 14px; margin-right: 24px; letter-spacing: 1px; }

/* ===== Sidebar ===== */
.sidebar {
  width: 232px; background: var(--white); border-right: 1px solid var(--border);
  position: fixed; top: 40px; left: 0; bottom: 0; z-index: 100;
  display: flex; flex-direction: column; box-shadow: 1px 0 4px rgba(0,0,0,0.03);
}
.sidebar-logo {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--primary), #6C8AFF);
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 12px;
}
.logo-info .logo-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.logo-info .logo-sub { font-size: 10px; color: var(--text-secondary); margin-top: 1px; }

.sidebar-nav { flex: 1; overflow-y: auto; padding: 6px 0; }
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: #E0E0E0; border-radius: 2px; }

.nav-group { margin-bottom: 2px; }
.nav-group-title { font-size: 11px; color: var(--text-secondary); padding: 8px 16px 3px; letter-spacing: 0.5px; font-weight: 500; }
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; font-size: 13px; color: var(--text-regular);
  cursor: pointer; transition: all 0.15s; margin: 1px 6px; border-radius: 6px;
  position: relative;
}
.nav-item:hover { background: var(--bg); color: var(--text-primary); }
.nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
.nav-item svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; flex-shrink: 0; }
.nav-item .badge {
  margin-left: auto; font-size: 10px; padding: 1px 6px; border-radius: 10px;
  background: var(--danger); color: white; font-weight: 600; min-width: 16px; text-align: center;
}
.nav-item .arrow { margin-left: auto; font-size: 10px; color: var(--text-placeholder); transition: transform 0.2s; }
.nav-item.expanded .arrow { transform: rotate(90deg); }

/* ===== Main Content ===== */
.main { margin-left: 232px; min-height: calc(100vh - 40px); display: flex; flex-direction: column; margin-top: 40px; }

/* Top Bar */
.topbar {
  height: 48px; background: var(--white); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; position: sticky; top: 0; z-index: 50;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.breadcrumb { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
.breadcrumb span { color: var(--text-primary); font-weight: 500; }
.breadcrumb .sep { color: var(--text-placeholder); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.topbar-icon { width: 30px; height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--bg); transition: background 0.15s; }
.topbar-icon:hover { background: var(--primary-light); }
.topbar-icon svg { width: 16px; height: 16px; stroke: var(--text-regular); fill: none; stroke-width: 1.6; }
.topbar-icon .dot { position: absolute; top: 6px; right: 6px; width: 6px; height: 6px; border-radius: 50%; background: var(--danger); }
.topbar-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #6C8AFF); display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; font-weight: 600; cursor: pointer; }
.topbar-user { display: flex; align-items: center; gap: 6px; cursor: pointer; }
.topbar-user span { font-size: 12px; color: var(--text-primary); font-weight: 500; }

.page-body { flex: 1; padding: 16px 20px; }

/* ===== Common Components ===== */
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.page-title { font-size: 18px; font-weight: 700; color: var(--text-primary); }
.page-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.page-actions { display: flex; gap: 8px; }

.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap; }
.btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-success { background: var(--success); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-warning { background: var(--warning); color: white; }
.btn-outline, .btn-default { background: var(--white); color: var(--text-regular); border: 1px solid var(--border); }
.btn-outline:hover, .btn-default:hover { border-color: var(--primary); color: var(--primary); }
.btn-text { background: none; color: var(--primary); padding: 4px 8px; }
.btn-text:hover { background: var(--primary-light); }
.btn-danger-text { background: none; color: var(--danger); padding: 4px 8px; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* Cards */
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; margin-bottom: 16px; }
.card-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--divider); }
.card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.card-body { padding: 18px; }
.card-footer { padding: 10px 18px; border-top: 1px solid var(--divider); display: flex; justify-content: space-between; align-items: center; }

/* Stat Cards */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.stat-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; position: relative; overflow: hidden; }
.stat-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.stat-card.blue::after { background: linear-gradient(90deg, var(--primary), #6C8AFF); }
.stat-card.green::after { background: linear-gradient(90deg, var(--success), #6EE7B7); }
.stat-card.orange::after { background: linear-gradient(90deg, var(--warning), #FCD34D); }
.stat-card.red::after { background: linear-gradient(90deg, var(--danger), #FCA5A5); }
.stat-card.teal::after { background: linear-gradient(90deg, var(--info), #67E8F9); }
.stat-card.purple::after { background: linear-gradient(90deg, #8B5CF6, #C4B5FD); }
.stat-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
.stat-icon svg { width: 20px; height: 20px; stroke-width: 1.8; }
.stat-icon.blue { background: var(--primary-light); color: var(--primary); }
.stat-icon.green { background: var(--success-light); color: var(--success); }
.stat-icon.orange { background: var(--warning-light); color: var(--warning); }
.stat-icon.red { background: var(--danger-light); color: var(--danger); }
.stat-icon.teal { background: var(--info-light); color: var(--info); }
.stat-icon.purple { background: #F5F3FF; color: #8B5CF6; }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.stat-value { font-size: 24px; font-weight: 700; color: var(--text-primary); font-family: 'Inter', sans-serif; margin-bottom: 4px; letter-spacing: -0.5px; }
.stat-footer { display: flex; align-items: center; gap: 4px; font-size: 11px; }
.stat-footer.up { color: var(--success); }
.stat-footer.down { color: var(--danger); }
.stat-footer svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

/* Tables */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 12px; color: var(--text-secondary); padding: 10px 14px; background: var(--bg); font-weight: 500; white-space: nowrap; border-bottom: 1px solid var(--border); }
td { font-size: 13px; padding: 12px 14px; border-bottom: 1px solid var(--divider); color: var(--text-regular); }
tr:hover td { background: var(--primary-light); }

/* Status Tags */
.tag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
.tag-blue { background: var(--primary-light); color: var(--primary); }
.tag-green { background: var(--success-light); color: var(--success); }
.tag-orange { background: var(--warning-light); color: var(--warning); }
.tag-red { background: var(--danger-light); color: var(--danger); }
.tag-teal { background: var(--info-light); color: var(--info); }
.tag-gray { background: #F3F4F6; color: #6B7280; }
.tag-purple { background: #F5F3FF; color: #8B5CF6; }
.tag-success { background: var(--success-light); color: var(--success); }
.tag-danger { background: var(--danger-light); color: var(--danger); }
.tag-warning { background: var(--warning-light); color: var(--warning); }

/* Filter Bar */
.filter-bar { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 18px; margin-bottom: 14px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
.filter-group { display: flex; flex-direction: column; gap: 3px; }
.filter-label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
.filter-input, .filter-select {
  background: var(--bg); border: 1px solid var(--border); color: var(--text-primary);
  padding: 6px 10px; border-radius: var(--radius-sm); font-size: 13px; font-family: inherit;
  min-width: 140px; outline: none; transition: border-color 0.15s;
}
.filter-input:focus, .filter-select:focus { border-color: var(--primary); }
.filter-input::placeholder { color: var(--text-placeholder); }
.filter-date { width: 130px; }
.filter-actions { display: flex; gap: 8px; align-items: flex-end; }

/* Tabs */
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
.tab { padding: 8px 16px; font-size: 13px; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; font-weight: 500; }
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab .count { font-size: 11px; background: var(--bg); padding: 1px 6px; border-radius: 10px; margin-left: 4px; color: var(--text-secondary); }
.tab.active .count { background: var(--primary-light); color: var(--primary); }

/* Pagination */
.pagination { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; }
.page-info { font-size: 12px; color: var(--text-secondary); }
.page-btns { display: flex; gap: 4px; }
.page-btn { min-width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: var(--white); color: var(--text-regular); display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; font-family: inherit; }
.page-btn:hover { border-color: var(--primary); color: var(--primary); }
.page-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

/* Charts Placeholder */
.chart-placeholder { height: 200px; background: linear-gradient(180deg, rgba(79,110,247,0.03) 0%, transparent 100%); border-radius: 8px; border: 1px dashed var(--border); display: flex; align-items: flex-end; padding: 16px; gap: 6px; }
.chart-bar { flex: 1; border-radius: 4px 4px 0 0; transition: height 0.3s; }

/* Alert Bar */
.alert-bar { border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; font-size: 13px; }
.alert-bar.warning { background: var(--warning-light); border: 1px solid #FDE68A; color: #92400E; }
.alert-bar.danger { background: var(--danger-light); border: 1px solid #FECACA; color: #991B1B; }
.alert-bar.info { background: var(--primary-light); border: 1px solid #C7D2FE; color: #3730A3; }

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; }
.grid-1-2 { display: grid; grid-template-columns: 1fr 2fr; gap: 14px; }

/* Quick link grid */
.quick-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.quick-item { text-align: center; padding: 14px 8px; border-radius: var(--radius-md); cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; }
.quick-item:hover { border-color: var(--primary); background: var(--primary-light); }
.quick-item svg { width: 24px; height: 24px; stroke: var(--primary); fill: none; stroke-width: 1.6; display: block; margin: 0 auto 6px; }
.quick-item span { font-size: 11px; color: var(--text-regular); display: block; }

/* Descriptions */
.desc-list { display: flex; flex-wrap: wrap; }
.desc-item { display: flex; min-width: 260px; padding: 8px 0; border-bottom: 1px solid var(--divider); }
.desc-label { width: 90px; flex-shrink: 0; font-size: 12px; color: var(--text-secondary); }
.desc-value { flex: 1; font-size: 12px; color: var(--text-primary); }

/* Form */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
.form-label .required { color: var(--danger); margin-left: 2px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; font-family: inherit; color: var(--text-primary); background: var(--white);
  outline: none; transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,110,247,0.1); }
.form-textarea { min-height: 70px; resize: vertical; }
.form-hint { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
.form-row { display: flex; gap: 16px; margin-bottom: 4px; flex-wrap: wrap; }
.form-row .form-group { flex: 1; min-width: 200px; }

/* Switch toggle */
.switch { position: relative; display: inline-block; width: 36px; height: 20px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; transition: 0.3s; border-radius: 20px; }
.slider::before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; transition: 0.3s; border-radius: 50%; }
.switch input:checked + .slider { background: var(--primary); }
.switch input:checked + .slider::before { transform: translateX(16px); }

/* Benefit cards */
.benefit-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.benefit-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; text-align: center; }
.benefit-card .level-name { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.benefit-card .level-condition { font-size: 11px; color: var(--text-secondary); margin-bottom: 8px; }
.benefit-card .level-perks { font-size: 12px; color: var(--text-regular); line-height: 1.6; margin-bottom: 8px; }
.benefit-card .level-count { font-size: 11px; color: var(--text-secondary); }

/* Section title */
.section-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

/* Two column layout with tree */
.two-col { display: grid; grid-template-columns: 280px 1fr; gap: 16px; }
.tree-list { border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
.tree-item { padding: 10px 14px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--divider); display: flex; justify-content: space-between; align-items: center; }
.tree-item:hover { background: var(--bg); }
.tree-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
.tree-item .count { font-size: 11px; color: var(--text-secondary); }
.tree-sub { padding-left: 20px; }
.tree-sub .tree-item { font-size: 12px; padding: 8px 14px; }

/* Tag list */
.tag-list { display: flex; flex-wrap: wrap; gap: 8px; }
.tag-item { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 12px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; }
.tag-item:hover { border-color: var(--primary); color: var(--primary); }
.tag-item.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }

/* Funnel chart */
.funnel { display: flex; flex-direction: column; gap: 4px; }
.funnel-step { display: flex; align-items: center; gap: 8px; }
.funnel-bar { height: 28px; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; font-size: 11px; color: white; font-weight: 500; }
.funnel-label { font-size: 12px; color: var(--text-secondary); min-width: 60px; }
.funnel-value { font-size: 12px; color: var(--text-primary); font-weight: 500; }

/* Empty state */
.empty { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: 13px; }
</style>
</head>
<body>

<!-- System Switcher -->
<div class="system-switcher">
  <div class="sys-tab-logo">CBD</div>
  <div class="sys-tab active" onclick="switchSystem('shop')">商城后台</div>
  <div class="sys-tab" onclick="switchSystem('platform')">供应商中台</div>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar"></div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><div class="breadcrumb" id="breadcrumb"></div></div>
    <div class="topbar-right">
      <div class="topbar-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" fill="none" stroke="currentColor" stroke-width="1.6"/></svg></div>
      <div class="topbar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span class="dot" style="position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--danger);"></span></div>
      <div class="topbar-user"><div class="topbar-avatar">管</div><span>管理员</span></div>
    </div>
  </div>
  <div class="page-body" id="pageBody"></div>
</div>

<script>
// ==================== DATA ====================
let currentSystem = 'shop';
let currentPage = '';

const shopMenus = [
  { group: '商品', items: ['商品管理', '添加商品', '商品品牌', '店铺分类', '商品标签', '素材管理'] },
  { group: '交易', items: ['全部订单', '交易单', '售后列表', '退款单', '运费模板', '配送管理'] },
  { group: '会员', items: ['会员列表'] },
  { group: '店铺', items: ['店铺信息'] },
  { group: '营销', items: ['优惠券管理', '发券记录', '加价购', '组合购', '限时优惠', '商品限购', '满折', '满减', '满赠'] },
  { group: '报表', items: ['店铺统计', '结算汇总'] },
  { group: '设置', items: ['店铺管理员', '店铺角色', '配送员', '导出列表', '脱敏数据'] }
];

const platformMenus = [

// ==================== SYSTEM SWITCH ====================
function switchSystem(sys) {
  currentSystem = sys;
  document.querySelectorAll('.sys-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && sys === 'shop') || (i === 1 && sys === 'platform'));
  });
  const menus = sys === 'shop' ? shopMenus : platformMenus;
  renderSidebar(menus);
  selectPage(menus[0].items[0]);
}

function renderSidebar(menus) {
  const nav = document.getElementById('sidebar');
  const logo = sys => sys === 'shop' ? 'CBD商城' : 'CBD中台';
  const sub = sys => sys === 'shop' ? '商城后台管理系统' : '跨境供应链管理平台';
  nav.innerHTML = `
    <div class="sidebar-logo">
      <div class="logo-icon">CB</div>
      <div class="logo-info"><div class="logo-title">${logo(currentSystem)}</div><div class="logo-sub">${sub(currentSystem)}</div></div>
    </div>
    <div class="sidebar-nav">
      ${menus.map(g => `
        <div class="nav-group">
          <div class="nav-group-title">${g.group}</div>
          ${g.items.map(item => `<div class="nav-item" onclick="selectPage('${item}')" id="nav-${item}">${item}</div>`).join('')}
        </div>
      `).join('')}
    </div>`;
}

function selectPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const el = document.getElementById('nav-' + page);
  if (el) el.classList.add('active');
  const bc = document.getElementById('breadcrumb');
  const menus = currentSystem === 'shop' ? shopMenus : platformMenus;
  const grp = menus.find(g => g.items.includes(page));
  bc.innerHTML = `${grp ? grp.group : ''} <span class="sep">/</span> <span>${page}</span>`;
  const content = currentSystem === 'shop' ? getShopPage(page) : getPlatformPage(page);
  document.getElementById('pageBody').innerHTML = content;
}
